[variables]
    PHP_VERSION = '8.2'
    NIXPACKS_PHP_EXTENSIONS = 'intl, mbstring, curl, openssl'

[phases.setup]
nixPkgs = ["php82", "php82Extensions.intl", "php82Extensions.mbstring", "php82Extensions.mysqlnd", "php82Extensions.curl", "composer"]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[start]
    cmd = 'php spark serve --host 0.0.0.0 --port $PORT'